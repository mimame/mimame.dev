{{ define "main" }}
  {{ .Scratch.Set "scope" "list" }}

  <header>
    <h1 class="mt-5 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
  </header>

  {{ if gt .Pages 0 }}
    <section class="w-full grid gap-4 sm:grid-cols-2 md:grid-cols-3 mt-6">
      {{ range .Pages.ByWeight }}
        {{ partial "article-link/card.html" . }}
      {{ end }}
    </section>
  {{ end }}

  <div style="margin-top: 2rem; display: flex; justify-content: space-between;">
    <a href="/expertise/" class="nav-next" style="font-size: 0.95rem; font-weight: 600;">← Expertise</a>
    <a href="/publications/" class="nav-next" style="font-size: 0.95rem; font-weight: 600;">View Publications →</a>
  </div>

{{ end }}
